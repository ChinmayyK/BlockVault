services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb -p local/$$S3_BUCKET || true
      "

  crypto:
    build:
      context: ../..
      dockerfile: Dockerfile.crypto
    restart: unless-stopped
    environment:
      CRYPTO_LISTEN_ADDR: 0.0.0.0:9876
      RUST_LOG: info

  redactor:
    build:
      context: ../../blockvault-redactor
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"

  backend:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
      - minio
      - crypto
      - redactor
    environment:
      FLASK_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/blockvault
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP_MINUTES: ${JWT_EXP_MINUTES}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CELERY_BROKER_URL: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/1
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      REDACTOR_SERVICE_URL: http://redactor:8000
      ETH_RPC_URL: ${ETH_RPC_URL}
      ETH_PRIVATE_KEY: ${ETH_PRIVATE_KEY}
      FILE_REGISTRY_ADDRESS: ${FILE_REGISTRY_ADDRESS}

  celery-worker:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: python -m celery -A blockvault.core.celery_app worker --loglevel=info --pool=solo
    restart: unless-stopped
    depends_on:
      - backend
      - redis
      - minio
      - redactor
      - crypto
    environment:
      FLASK_ENV: production
      MONGO_URI: mongodb://mongo:27017/blockvault
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      CELERY_BROKER_URL: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/1
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      REDACTOR_SERVICE_URL: http://redactor:8000
      ETH_RPC_URL: ${ETH_RPC_URL}
      ETH_PRIVATE_KEY: ${ETH_PRIVATE_KEY}
      FILE_REGISTRY_ADDRESS: ${FILE_REGISTRY_ADDRESS}

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro


volumes:
  mongo_data:
  redis_data:
  minio_data:
